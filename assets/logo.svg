<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b5bd6" />
      <stop offset="1" stop-color="#7c52d9" />
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- rounded app-icon background -->
  <rect width="128" height="128" rx="30" fill="url(#bg)" />
  <rect width="128" height="128" rx="30" fill="url(#sheen)" />

  <!-- soft shadow under the front card -->
  <rect x="33" y="41" width="64" height="44" rx="10" fill="#1e1b4b" opacity="0.22" />

  <!-- stacked flashcards -->
  <rect x="32" y="50" width="64" height="42" rx="10" fill="#ffffff" opacity="0.55" />
  <rect x="32" y="36" width="64" height="44" rx="10" fill="#ffffff" />

  <!-- term / definition lines on the front card -->
  <rect x="44" y="49" width="40" height="6" rx="3" fill="#6d54e0" />
  <rect x="44" y="61" width="28" height="6" rx="3" fill="#a896e8" />
</svg>
